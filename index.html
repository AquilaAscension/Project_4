<!DOCTYPE html>
<html>
<head>
    <title>Greenhouse Dashboard</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 600px; }
        .gauges { display: flex; justify-content: space-around; margin-bottom: 30px; }
        button { background: #4caf50; color: white; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; transition: 0.3s; width: 100%; }
        button:hover { background: #45a049; transform: translateY(-2px); }
        button:disabled { background: #333; cursor: not-allowed; }
        #status { margin-top: 15px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">Greenhouse Control</h2>
        <div class="gauges">
            <div id="temp_gauge"></div>
            <div id="pres_gauge"></div>
        </div>
        <button id="pumpBtn" onclick="sendPulse()">Trigger 5s Water Pulse</button>
        <div id="status">Waiting for data...</div>
    </div>

    <script>
        const CHANNEL_ID = "3353895";
        const READ_KEY = "VI1SIJ9X0KFI5ZT4";
        const TB_ID = "56829";
        const TB_KEY = "V0XJMORMV3J2JJNO";

        google.charts.load('current', {'packages':['gauge']});
        google.charts.setOnLoadCallback(refreshData);

        async function refreshData() {
            try {
                const res = await fetch(`https://api.thingspeak.com/channels/${CHANNEL_ID}/feeds/last.json?api_key=${READ_KEY}`);
                const data = await res.json();
                
                // Safety check: if field is null/missing, use a default value to prevent NaN
                const tempVal = data.field1 ? parseFloat(data.field1) : 0;
                const presVal = data.field2 ? parseFloat(data.field2) : 1013.25;
                
                console.log("Raw Data:", data); // Check your console to see if field2 is coming through

                // Update Gauges
                drawGauge('temp_gauge', 'Temp', tempVal, 0, 50);
                drawGauge('pres_gauge', 'hPa', presVal, 900, 1100);
                
                document.getElementById('status').innerText = "Last Updated: " + new Date(data.created_at).toLocaleTimeString();
            } catch (e) { 
                document.getElementById('status').innerText = "Syncing..."; 
            }
            setTimeout(refreshData, 15000);
        }

        function drawGauge(id, label, val, min, max) {
            var data = google.visualization.arrayToDataTable([['Label', 'Value'], [label, val]]);
            var options = { width: 150, height: 150, min: min, max: max, yellowFrom: max-10, yellowTo: max, minorTicks: 5 };
            new google.visualization.Gauge(document.getElementById(id)).draw(data, options);
        }

        async function sendPulse() {
            const btn = document.getElementById('pumpBtn');
            btn.disabled = true;
            btn.innerText = "Queuing Pulse...";
            
            const url = `https://api.thingspeak.com/talkbacks/${TB_ID}/commands.json`;
            const params = new URLSearchParams({ 'api_key': TB_KEY, 'command_string': 'PUMP_ON' });

            await fetch(url, { method: 'POST', body: params });
            
            document.getElementById('status').innerText = "Command Sent! Pi will execute on next sync.";
            setTimeout(() => { btn.disabled = false; btn.innerText = "Trigger 5s Water Pulse"; }, 5000);
        }
    </script>
</body>
</html>
